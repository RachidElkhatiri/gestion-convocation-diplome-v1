<div class="card shadow-sm"><div class="card-body">
  <h4>Lancer attribution</h4>
  <form [formGroup]="form" class="row g-3">
    <div class="col-md-3"><label>Date de départ</label><input type="date" class="form-control" formControlName="startDate"></div>
    <div class="col-md-3"><label>Catégorie</label><input class="form-control" formControlName="categorie"></div>
    <div class="col-md-3 form-check mt-4"><input class="form-check-input" type="checkbox" formControlName="processByCategory"><label class="form-check-label">Par catégorie</label></div>
    <div class="col-md-3 form-check mt-4"><input class="form-check-input" type="checkbox" formControlName="resetResults"><label class="form-check-label">Réinitialiser résultats</label></div>
    <div class="col-12"><button class="btn btn-primary" type="button" (click)="run()">Générer attribution</button></div>
  </form>
</div></div>
