<div class="card shadow-sm mb-3">
  <div class="card-body">
    <h4 class="mb-3">Candidats transformés</h4>
    <form [formGroup]="filters" class="row g-2 mb-3">
      <div class="col-md-2"><input class="form-control" placeholder="Province" formControlName="province" /></div>
      <div class="col-md-2"><input class="form-control" placeholder="Centre" formControlName="centre" /></div>
      <div class="col-md-2"><input class="form-control" placeholder="Sexe" formControlName="sexe" /></div>
      <div class="col-md-2"><input class="form-control" placeholder="Catégorie" formControlName="categorie" /></div>
      <div class="col-md-2"><input class="form-control" placeholder="CIN" formControlName="cin" /></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" type="button" (click)="search()">Filtrer</button></div>
    </form>

    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead><tr><th>ID</th><th>CIN</th><th>Nom</th><th>Prénom</th><th>Province</th><th>Centre</th><th>Catégorie</th></tr></thead>
        <tbody>
          <tr *ngFor="let c of candidats">
            <td>{{ c.id }}</td><td>{{ c.cin }}</td><td>{{ c.nom }}</td><td>{{ c.prenom }}</td><td>{{ c.province }}</td><td>{{ c.centre }}</td><td>{{ c.categorie }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
