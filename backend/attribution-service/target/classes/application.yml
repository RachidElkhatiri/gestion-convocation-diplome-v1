server:
  port: 8083

spring:
  application:
    name: attribution-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:APP_GCD}
    password: ${SPRING_DATASOURCE_PASSWORD:APP_GCD_PWD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  cloud:
    config:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

clients:
  candidat:
    url: ${CLIENTS_CANDIDAT_URL:http://localhost:8081}
  geo:
    url: ${CLIENTS_GEO_URL:http://localhost:8082}

attribution:
  default-start-date-offset-days: 1
  holidays:
    - 2026-01-01
    - 2026-05-01
    - 2026-07-30
    - 2026-08-14
    - 2026-08-20
    - 2026-11-06
    - 2026-11-18

logging:
  level:
    com.gcd.attribution: INFO
