server:
  port: 8083

spring:
  application:
    name: attribution-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XEPDB1
    username: APP_GCD
    password: APP_GCD_PWD
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  cloud:
    config:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    enabled: false

clients:
  candidat:
    url: http://localhost:8081
  geo:
    url: http://localhost:8082

attribution:
  default-start-date-offset-days: 1
  holidays:
    - 2026-01-01
    - 2026-05-01
    - 2026-07-30
    - 2026-08-14
    - 2026-08-20
    - 2026-11-06
    - 2026-11-18

logging:
  level:
    com.gcd.attribution: INFO
