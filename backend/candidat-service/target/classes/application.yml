server:
  port: 8081

spring:
  application:
    name: candidat-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:APP_GCD}
    password: ${SPRING_DATASOURCE_PASSWORD:APP_GCD_PWD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  cloud:
    config:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

app:
  geo:
    base-url: ${APP_GEO_BASE_URL:http://localhost:8082}
