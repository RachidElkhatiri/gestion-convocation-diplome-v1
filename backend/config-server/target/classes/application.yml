server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - file:${CONFIG_REPO_PATH:../config-repo}
            - file:${CONFIG_REPO_FALLBACK:../../backend/config-repo}

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
